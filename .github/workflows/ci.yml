name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          check-latest: true

      - uses: golangci/golangci-lint-action@v9
        with:
          version: v2.12.2

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          check-latest: true

      - name: go mod tidy is clean
        run: |
          go mod tidy
          git diff --exit-code go.mod go.sum

      - name: Vet
        run: go vet ./...

      - name: Test
        env:
          CGO_ENABLED: "0"
        run: go test ./...

      - name: Build (windows/amd64)
        env:
          CGO_ENABLED: "0"
          GOOS: windows
          GOARCH: amd64
        # Mirrors .goreleaser.yml: -H=windowsgui suppresses the console
        # window when the host launches the plugin subprocess on Windows.
        run: go build -trimpath -ldflags="-s -w -H=windowsgui" -o /tmp/hashpoint-plugin-soggl.exe ./cmd/hashpoint-plugin-soggl
