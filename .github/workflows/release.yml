name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          check-latest: true

      - name: Verify version lockstep (tag == manifest.toml)
        run: |
          tag="${GITHUB_REF_NAME}"
          tag_version="${tag#v}"
          manifest_version="$(awk -F'"' '/^version[[:space:]]*=/ {print $2; exit}' manifest.toml)"
          if [ "$tag_version" != "$manifest_version" ]; then
            echo "::error::git tag $tag (=$tag_version) does not match manifest.toml version $manifest_version"
            exit 1
          fi

      - uses: goreleaser/goreleaser-action@v6
        with:
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
