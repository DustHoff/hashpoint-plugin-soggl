name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # No automatic baseline-tag seed. The default GITHUB_TOKEN does not
      # carry the `workflows` permission, so it cannot push a tag that
      # references a commit containing `.github/workflows/*` files — and
      # the initial commit of this repo does (see run #25935512641). The
      # baseline `v1.0.0` is therefore set ONCE manually by the maintainer
      # at repo bootstrap (see "Release workflow" in CLAUDE.md); from then
      # on mathieudutour/github-tag-action counts bumps from that tag.

      - name: Bump version (Conventional Commits → SemVer)
        id: tag
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          # On normal pushes: only feat/fix/BREAKING-CHANGE produce a bump.
          # On manual workflow_dispatch: force a patch bump so the user can
          # mint a fresh release even when no bumpable commits have landed
          # since the last tag (e.g. to apply a release-tooling change).
          default_bump: ${{ github.event_name == 'workflow_dispatch' && 'patch' || 'false' }}
          release_branches: main

      # mathieudutour/github-tag-action creates the new tag via the GitHub
      # REST API, so the workflow's local checkout never learns about it.
      # GoReleaser then runs `git describe --tags --exact-match HEAD`,
      # finds no tag, and errors out with
      #   "git tag <ver> was not made against commit <sha>".
      # Pull the freshly-pushed tag back into the local repo before
      # GoReleaser starts.
      - name: Fetch newly created tag into local repo
        if: steps.tag.outputs.new_tag != ''
        run: git fetch --tags --force

      - name: Setup Go
        if: steps.tag.outputs.new_tag != ''
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          check-latest: true

      - name: GoReleaser
        if: steps.tag.outputs.new_tag != ''
        uses: goreleaser/goreleaser-action@v6
        with:
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GORELEASER_CURRENT_TAG: ${{ steps.tag.outputs.new_tag }}
