name         = "soggl"
# version is rewritten by scripts/inject-manifest-version.sh at release time
# (called from .goreleaser.yml `before.hooks`). Leave at "0.0.0-dev" in source.
version      = "0.0.0-dev"
api_version  = 1
description  = "Tag provider bridging Hashpoint with the internal Soggl application."
capabilities = ["tag_provider"]

[config_schema.fields.entra_scope]
label    = "Entra Scope"
type     = "text"
required = true

[config_schema.fields.soggl_host]
label    = "Soggl Host"
type     = "text"
required = true

[config_schema.fields.jobs_window]
label    = "Jobs window"
type     = "text"
required = false
default  = "today"

[config_schema.fields.sync_to_soggl]
label    = "Sync tag-order changes to Soggl"
type     = "boolean"
required = false
default  = "true"
