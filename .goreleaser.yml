version: 2

# project_name MUST equal the plugin's `name` in manifest.toml AND the
# entry in DustHoff/hashpoint-plugin-manager's repo.json. The plugin
# manager derives the release asset name from it as
# `<project_name>_<version>_<os>_<arch>.zip` and expects the same
# string as the single top-level directory inside the zip. A mismatch
# surfaces at install time as `asset "<expected>" not found in release`.
# Keep this in sync with manifest.toml and internal/plugin.Name.
project_name: soggl

before:
  hooks:
    - go mod tidy
    - sh scripts/inject-manifest-version.sh {{ .Version }}

builds:
  - id: soggl
    # Source directory under cmd/ stays at its historical name; only the
    # produced binary uses the short plugin identity so the host's
    # `<plugins>/<name>/<name>.exe` lookup finds it.
    main: ./cmd/hashpoint-plugin-soggl
    binary: soggl
    env:
      - CGO_ENABLED=0
    goos:
      - windows
    goarch:
      - amd64
    flags:
      - -trimpath
    ldflags:
      - -s -w
      # -H=windowsgui sets the PE subsystem so Windows does not allocate
      # a console window when the host launches the plugin subprocess.
      - -H=windowsgui
      # Inject the release version into the in-source placeholder
      # `pluginVersion = "dev"` so Metadata().Version reports the git tag.
      # The ldflag path is the Go module path (unchanged), not the plugin
      # identity — those are two separate concepts.
      - -X github.com/dusthoff/hashpoint-plugin-soggl/internal/plugin.pluginVersion={{ .Version }}

archives:
  - id: default
    ids:
      - soggl
    formats:
      - zip
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    # Nest every archive entry inside a `soggl/` directory so the plugin
    # manager's "exactly one top-level directory named <name>/" check
    # passes when it extracts the zip into <PluginsDir>/<name>/.
    wrap_in_directory: "{{ .ProjectName }}"
    files:
      # Use the version-substituted manifest produced by the inject hook
      # above, not the in-source placeholder manifest.toml.
      - src: manifest.toml.versioned
        dst: manifest.toml

checksum:
  split: true
  algorithm: sha256
  name_template: "{{ .ArtifactName }}.sha256"

release:
  draft: false
  prerelease: auto

changelog:
  use: github
  sort: asc
  groups:
    - title: Features
      regexp: '^.*?feat(\(.+\))??!?:.+$'
      order: 0
    - title: Bug Fixes
      regexp: '^.*?fix(\(.+\))??!?:.+$'
      order: 1
    - title: Others
      order: 999
  filters:
    exclude:
      - "^docs:"
      - "^chore:"
      - "^test:"
      - "^ci:"
      - "Merge pull request"
